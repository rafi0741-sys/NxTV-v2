<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NXTV</title>
<script src="hls.min.js"></script>
<style>
  :root{
    --bg:#14251b; --panel:#1b3025; --panel2:#234133; --line:#2f4d3c;
    --text:#e8f0e8; --muted:#8fae98; --accent:#c3ec3f; --accentDim:#6f8a2a;
    --live:#ff6b6b; --radius:12px;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:18px;overflow:hidden;-webkit-user-select:none;user-select:none}
  button,input{font-family:inherit}
  img{-webkit-user-drag:none}

  /* Focus ring — one consistent treatment everywhere */
  .foc{transition:box-shadow .12s,background .12s,color .12s}
  .foc.on{outline:none;box-shadow:0 0 0 4px var(--accent),0 0 28px rgba(195,236,63,.55);background:var(--panel2);z-index:5}

  /* ---------- Wordmark ---------- */
  .wm{display:flex;align-items:center;gap:.1em;font-weight:800;font-style:italic;letter-spacing:-.02em;line-height:1}
  .wm .l{color:var(--text)}
  .wm .v{color:var(--accent)}
  .wm .x{color:var(--text);font-size:1.32em;margin:0 .04em;position:relative;top:-.01em}
  .wm .rem{display:inline-block;width:.82em;height:1.05em;vertical-align:middle}
  .wm .rem svg{width:100%;height:100%;display:block;overflow:visible}
  .wm .tm{color:var(--accent);font-size:.34em;font-style:normal;font-weight:700;align-self:flex-start;margin-top:.3em}

  /* ---------- Login ---------- */
  #login{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 20% -10%,rgba(195,236,63,.08),transparent 60%),var(--bg);z-index:100}
  #login.show{display:flex}
  .card{width:min(560px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:40px}
  .card .wm{font-size:30px;justify-content:center;margin-bottom:6px}
  .sub{color:var(--muted);font-size:14px;text-align:center;margin-bottom:26px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
  .field input{width:100%;padding:14px 15px;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);color:var(--text);font-size:17px}
  .field input.on{outline:none;box-shadow:0 0 0 3px var(--accent)}
  .btn{width:100%;padding:15px;background:var(--accent);color:#04160d;font-weight:700;border:none;border-radius:var(--radius);font-size:17px}
  .btn.on{outline:none;box-shadow:0 0 0 3px #fff,0 0 24px var(--accent)}
  .btn2{width:100%;padding:15px;background:none;border:1px solid var(--line);color:var(--text);border-radius:var(--radius);font-size:16px;font-weight:600}
  .btn2.on{outline:none;box-shadow:0 0 0 3px var(--accent);color:var(--accent)}
  .err{color:var(--live);font-size:14px;margin-top:12px;min-height:18px}
  .hint{color:var(--muted);font-size:12px;margin-top:16px;line-height:1.5}

  /* ---------- Home ---------- */
  #home{position:fixed;inset:0;display:none;overflow-y:auto;z-index:60;padding:44px 52px;
    background:radial-gradient(1400px 700px at 20% -10%,rgba(195,236,63,.08),transparent 60%),var(--bg)}
  #home.show{display:block}
  #home .wm{font-size:34px;margin-bottom:6px}
  .home-sub{color:var(--muted);font-size:15px;margin-bottom:30px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;max-width:1180px}
  .acct{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;position:relative}
  .acct.active{border-color:var(--accent)}
  .badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--bg);background:var(--accent);border-radius:6px;padding:3px 8px;margin-bottom:12px}
  .badge.m3u{background:#7fd0ff}
  .acct h3{font-size:19px;margin-bottom:4px;word-break:break-word}
  .acct .meta{color:var(--muted);font-size:12px;font-family:var(--mono);word-break:break-all;margin-bottom:16px}
  .acct .tag{position:absolute;top:18px;right:18px;color:var(--accent);font-size:12px;font-weight:700}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row .cbtn{flex:1;min-width:80px;padding:10px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--line);background:var(--bg);color:var(--text)}
  .row .cbtn.pri{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .row .cbtn.on{outline:none;box-shadow:0 0 0 3px var(--accent)}
  .row .cbtn.danger.on{box-shadow:0 0 0 3px var(--live)}
  .add{display:flex;align-items:center;justify-content:center;min-height:170px;border:2px dashed var(--line);border-radius:14px;color:var(--muted);font-size:16px;font-weight:600;background:transparent}
  .add.on{outline:none;border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
  .quit{margin-top:16px;padding:10px 18px;background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:10px;font-size:14px;font-weight:600}
  .quit.on{outline:none;box-shadow:0 0 0 3px var(--live);color:var(--live)}

  /* ---------- Editor ---------- */
  #editor{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(8,14,10,.8);z-index:80;padding:20px;overflow-y:auto}
  #editor.show{display:flex}
  .ecard{width:min(520px,94vw);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px}
  .ecard h2{font-size:22px;margin-bottom:20px}
  .seg{display:flex;gap:6px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:6px}
  .seg .sbtn{flex:1;padding:11px 6px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;border-radius:7px}
  .seg .sbtn.sel{background:var(--panel2);color:var(--accent)}
  .seg .sbtn.on{outline:none;box-shadow:0 0 0 2px var(--accent)}
  .filenote{color:var(--muted);font-size:12px;margin-top:8px}
  .eact{display:flex;gap:12px;margin-top:14px}

  /* ---------- App shell ---------- */
  #app{display:none;height:100%;grid-template-columns:250px 380px 1fr}
  #app.show{display:grid}
  .col{height:100%;overflow-y:auto;border-right:1px solid var(--line);scrollbar-width:none}
  .col::-webkit-scrollbar{display:none}
  .nav{background:var(--panel);padding:20px 14px}
  .nav .wm{font-size:28px;padding:4px 6px 20px}
  .navbtn{width:100%;padding:13px 15px;background:var(--bg);border:1px solid var(--line);color:var(--muted);font-size:15px;font-weight:600;border-radius:10px;text-align:left;margin-bottom:8px}
  .navbtn.sel{color:var(--accent);border-color:var(--accentDim)}
  .navbtn.on{outline:none;box-shadow:0 0 0 3px var(--accent);color:var(--accent)}
  .catlist{margin-top:12px}
  .cat{padding:12px 14px;border-radius:9px;color:var(--muted);font-size:15px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cat.sel{color:var(--accent)}
  .cat.on{outline:none;box-shadow:0 0 0 3px var(--accent);color:var(--accent);background:var(--panel2)}

  .channels{background:var(--panel)}
  .chhead{position:sticky;top:0;background:var(--panel);padding:16px 14px 10px;border-bottom:1px solid var(--line);z-index:2}
  .chsearch{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--text);font-size:14px}
  .chsearch.on{outline:none;box-shadow:0 0 0 3px var(--accent)}
  .chcount{padding:8px 14px 4px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .chlist{padding:8px}
  .ch{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:9px;margin-bottom:3px}
  .ch.playing{background:linear-gradient(90deg,rgba(195,236,63,.16),transparent);box-shadow:inset 3px 0 0 var(--accent)}
  .ch.on{outline:none;box-shadow:0 0 0 3px var(--accent);background:var(--panel2)}
  .ch img,.ch .noimg{width:46px;height:46px;border-radius:8px;object-fit:contain;background:var(--bg);flex-shrink:0}
  .ch .noimg{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px}
  .ch .meta{min-width:0;flex:1}
  .ch .t{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ch .s{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .heart{background:none;border:none;color:var(--muted);font-size:20px;padding:4px 6px;border-radius:8px;flex-shrink:0}
  .heart.fav{color:var(--live)}
  .heart.on{outline:none;box-shadow:0 0 0 2px var(--accent);color:var(--accent)}
  .empty{padding:44px 22px;text-align:center;color:var(--muted);font-size:15px;line-height:1.6}

  /* ---------- Stage / player ---------- */
  .stage{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
  .vwrap{position:relative;background:#000;aspect-ratio:16/9;width:100%}
  .vwrap video{width:100%;height:100%;background:#000}
  .vwrap.fs{position:fixed;inset:0;z-index:90;aspect-ratio:auto}
  .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
  .placeholder .ico{font-size:50px;opacity:.5}
  /* focusable video surface (for preview-pane OK/Right = fullscreen) */
  .vsurface{position:absolute;inset:0;background:transparent}
  .vsurface.on{outline:none;box-shadow:inset 0 0 0 3px var(--accent)}

  .now{padding:22px 26px;border-top:1px solid var(--line);overflow-y:auto;flex:1;scrollbar-width:none}
  .now::-webkit-scrollbar{display:none}
  .live-tag{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--live);text-transform:uppercase;margin-bottom:8px}
  .live-tag .dot{width:9px;height:9px;border-radius:50%;background:var(--live);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .now h2{font-size:24px;margin-bottom:6px}
  .now .nsub{color:var(--muted);font-size:14px;font-family:var(--mono)}
  .now .buffering{color:var(--accent);font-size:13px;margin-top:12px}
  .now .serr{color:var(--live);font-size:14px;margin-top:12px;line-height:1.5}
  .hint-play{color:var(--muted);font-size:12px;margin-top:14px}
  .eplist{margin-top:16px}
  .ep{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-top:5px;background:var(--bg)}
  .ep.on{outline:none;box-shadow:0 0 0 3px var(--accent);background:var(--panel2)}
  .ep .noimg{width:34px;height:34px;border-radius:6px;background:var(--panel);display:flex;align-items:center;justify-content:center;color:var(--muted)}

  /* ---------- Fullscreen control bar (the rebuilt part) ---------- */
  .cbar{position:absolute;left:0;right:0;bottom:0;z-index:95;display:none;flex-direction:column;gap:14px;padding:52px 30px 26px;
    background:linear-gradient(to top,rgba(8,14,10,.94),rgba(8,14,10,.55) 62%,transparent);opacity:1;transition:opacity .3s}
  .vwrap.fs .cbar{display:flex}
  .vwrap.fs.hidebar .cbar{opacity:0;pointer-events:none}
  .vwrap.fs.hidebar{cursor:none}
  .cbar-scrub{display:flex;align-items:center;gap:16px}
  .ctime{color:var(--text);font-size:14px;font-family:var(--mono);min-width:64px;text-align:center}
  .scrub{position:relative;flex:1;height:8px;background:rgba(255,255,255,.22);border-radius:6px}
  .scrub.on{outline:none;box-shadow:0 0 0 3px var(--accent);height:12px}
  .scrub .buf{position:absolute;top:0;left:0;height:100%;width:0;background:rgba(255,255,255,.28);border-radius:6px}
  .scrub .fill{position:absolute;top:0;left:0;height:100%;width:0;background:var(--accent);border-radius:6px}
  .scrub .knob{position:absolute;top:50%;left:0;width:18px;height:18px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(195,236,63,.6)}
  .cbar-btns{display:flex;align-items:center;gap:12px}
  .pbtn{padding:12px 16px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:var(--text);font-size:15px;font-weight:600;border-radius:10px;min-width:52px}
  .pbtn.on{outline:none;box-shadow:0 0 0 3px var(--accent);background:rgba(195,236,63,.16);color:var(--accent)}
  .pbtn.active{color:var(--accent);border-color:var(--accentDim)}
  .pbtn.play{min-width:64px;font-size:16px}
  .pbtn-spacer{flex:1}
  .backbtn{position:absolute;top:22px;left:24px;z-index:96;padding:12px 22px;background:rgba(11,18,14,.8);border:1.5px solid rgba(255,255,255,.18);color:var(--text);font-size:18px;font-weight:700;border-radius:14px;display:none;align-items:center;gap:4px}
  .vwrap.fs .backbtn{display:flex}
  .vwrap.fs.hidebar .backbtn{opacity:0;pointer-events:none;transition:opacity .3s}
  .backbtn.on{outline:none;box-shadow:0 0 0 3px var(--accent);color:var(--accent)}

  /* Track picker (audio / subtitles) */
  .tpop{display:none;position:absolute;right:30px;bottom:130px;z-index:97;background:rgba(11,18,14,.97);border:1px solid var(--line);border-radius:12px;padding:10px;min-width:220px;max-height:44vh;overflow-y:auto}
  .tpop.show{display:block}
  .tpop-title{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:6px 10px 8px}
  .titem{padding:11px 12px;border-radius:8px;font-size:14px;color:var(--text)}
  .titem.on{outline:none;box-shadow:0 0 0 2px var(--accent);background:var(--panel2)}
  .titem.sel{color:var(--accent)}
  .titem.sel::before{content:"✓ "}
  .tnone{padding:12px;color:var(--muted);font-size:13px}

  /* Resume prompt */
  .resume{display:none;position:absolute;inset:0;z-index:96;align-items:center;justify-content:center;background:rgba(8,14,10,.7)}
  .resume.show{display:flex}
  .rcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px 32px;text-align:center;max-width:460px}
  .rcard .rt{font-size:19px;font-weight:700;margin-bottom:20px}
  .rcard .ra{display:flex;flex-direction:column;gap:12px}

  .loadbar{position:fixed;top:0;left:0;height:3px;background:var(--accent);width:0;transition:width .3s;z-index:200;box-shadow:0 0 8px var(--accent)}

  @media(max-width:900px){
    #app.show{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}
    .nav{display:none}
  }
</style>
</head>
<body>
<div class="loadbar" id="loadbar"></div>

<!-- svg template for the crossed-remote glyph -->
<template id="remTpl"><span class="rem"><svg viewBox="0 0 150 190"><g transform="skewX(-8)"><rect x="12" y="8" width="126" height="46" rx="16" fill="var(--text)"/><rect x="54" y="46" width="42" height="138" rx="20" fill="var(--text)"/><circle cx="118" cy="31" r="10" fill="var(--accent)"/><circle cx="66" cy="86" r="5" fill="var(--bg)"/><circle cx="84" cy="86" r="5" fill="var(--bg)"/><circle cx="66" cy="108" r="5" fill="var(--bg)"/><circle cx="84" cy="108" r="5" fill="var(--bg)"/><rect x="64" y="140" width="22" height="30" rx="11" fill="var(--accent)"/></g></svg></span></template>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <div class="wm" id="wmLogin"></div>
    <div class="sub">Sign in with your Xtream Codes account</div>
    <div class="field"><label>Server URL</label><input id="lHost" class="foc" placeholder="http://example.com:8080" autocomplete="off" spellcheck="false"></div>
    <div class="field"><label>Username</label><input id="lUser" class="foc" autocomplete="off" spellcheck="false"></div>
    <div class="field"><label>Password</label><input id="lPass" class="foc" type="password" autocomplete="off"></div>
    <button class="btn foc" id="lConnect">Connect</button>
    <div class="err" id="lErr"></div>
    <div class="hint">Use the D-pad to move, center button to select.</div>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <div class="wm" id="wmHome"></div>
  <div class="home-sub">Your playlists &amp; accounts</div>
  <div class="grid" id="grid"></div>
  <button class="quit foc" id="quitBtn" style="display:none">⏻ Quit NXTV</button>
</div>

<!-- EDITOR -->
<div id="editor">
  <div class="ecard">
    <h2 id="eTitle">Add account</h2>
    <div class="field"><label>Source type</label>
      <div class="seg">
        <button class="sbtn foc sel" data-src="xtream">Xtream Codes</button>
        <button class="sbtn foc" data-src="m3u_url">M3U URL</button>
        <button class="sbtn foc" data-src="m3u_file">M3U File</button>
      </div>
    </div>
    <div class="field"><label>Name (label)</label><input id="eName" class="foc" placeholder="My provider" autocomplete="off"></div>
    <div class="sfields" data-for="xtream">
      <div class="field"><label>Server URL</label><input id="eHost" class="foc" placeholder="http://example.com:8080" autocomplete="off" spellcheck="false"></div>
      <div class="field"><label>Username</label><input id="eUser" class="foc" autocomplete="off" spellcheck="false"></div>
      <div class="field"><label>Password</label><input id="ePass" class="foc" type="password" autocomplete="off"></div>
    </div>
    <div class="sfields" data-for="m3u_url" style="display:none">
      <div class="field"><label>M3U Playlist URL</label><input id="eM3uUrl" class="foc" placeholder="http://example.com/list.m3u" autocomplete="off" spellcheck="false"></div>
    </div>
    <div class="sfields" data-for="m3u_file" style="display:none">
      <div class="field"><label>M3U File</label><input id="eM3uFile" class="foc" type="file" accept=".m3u,.m3u8">
        <div class="filenote" id="eFileNote">No file chosen.</div></div>
    </div>
    <div class="eact">
      <button class="btn foc" id="eSave" style="flex:1">Save</button>
      <button class="btn2 foc" id="eCancel" style="flex:1">Cancel</button>
    </div>
    <div class="err" id="eErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="col nav">
    <div class="wm" id="wmNav"></div>
    <button class="navbtn foc" id="navHome">⌂ Home</button>
    <button class="navbtn foc sel" data-type="live">Live TV</button>
    <button class="navbtn foc" data-type="vod">Movies</button>
    <button class="navbtn foc" data-type="series">Series</button>
    <div class="catlist" id="catList"></div>
  </div>
  <div class="col channels">
    <div class="chhead"><input class="chsearch foc" id="chSearch" placeholder="Search in selection…"></div>
    <div class="chlist" id="chList"><div class="empty">Pick a category to load channels.</div></div>
  </div>
  <div class="col stage">
    <div class="vwrap" id="vwrap">
      <button class="backbtn foc" id="backBtn">← Back</button>
      <video id="video" playsinline></video>
      <div class="placeholder" id="placeholder"><div class="ico">▶</div><div>Select something to watch</div></div>
      <div class="vsurface foc" id="vsurface"></div>
      <!-- fullscreen controls -->
      <div class="cbar" id="cbar">
        <div class="cbar-scrub">
          <span class="ctime" id="curTime">0:00</span>
          <div class="scrub foc" id="scrub"><div class="buf" id="scrubBuf"></div><div class="fill" id="scrubFill"></div><div class="knob" id="scrubKnob"></div></div>
          <span class="ctime" id="durTime">0:00</span>
        </div>
        <div class="cbar-btns">
          <button class="pbtn foc" id="pRew">« 10</button>
          <button class="pbtn play foc" id="pPlay">❚❚</button>
          <button class="pbtn foc" id="pFwd">10 »</button>
          <button class="pbtn foc" id="pNext" style="display:none">Next ▶</button>
          <div class="pbtn-spacer"></div>
          <button class="pbtn foc" id="pCC">CC</button>
          <button class="pbtn foc" id="pAudio">🔊 Audio</button>
        </div>
      </div>
      <div class="tpop" id="tpop"><div class="tpop-title" id="tpopTitle">Audio</div><div id="tpopList"></div></div>
      <div class="resume" id="resume">
        <div class="rcard"><div class="rt">Resume playback?</div>
          <div class="ra"><button class="btn foc" id="rResume">Resume from <span id="rAt">0:00</span></button>
          <button class="btn2 foc" id="rRestart">Play from beginning</button></div>
        </div>
      </div>
    </div>
    <div class="now" id="now"><div class="empty" style="text-align:left;padding:0">Nothing playing yet.</div></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
